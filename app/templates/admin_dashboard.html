<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Admin Panel</h3>
      <a class="btn btn-outline-secondary btn-sm" href="/logout">Logout</a>
    </div>

    {% if message %}
    <div class="alert alert-info"><pre class="mb-0">{{ message }}</pre></div>
    {% endif %}

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5>Push Config To Devices</h5>
            <form action="/admin/config/push" method="post" enctype="multipart/form-data">
              <div class="mb-2">
                <label class="form-label">Devices</label>
                <select class="form-select" name="device_ids" multiple size="10" required>
                  {% for d in devices %}
                  <option value="{{ d.id }}">{{ d.name }} ({{ d.host }}:{{ d.port }})</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-2">
                <label class="form-label">Config File</label>
                <input class="form-control" type="file" name="config_file" />
              </div>
              <div class="mb-2">
                <label class="form-label">Or Config Text</label>
                <textarea class="form-control" name="config_text" rows="6"></textarea>
              </div>
              <button class="btn btn-primary" type="submit">Push Config</button>
            </form>
          </div>
        </div>

        <div class="card mt-3">
          <div class="card-body">
            <h5>Assign Device To Student</h5>
            <form action="/admin/devices/assign" method="post">
              <div class="mb-2">
                <label class="form-label">Device</label>
                <select class="form-select" name="device_id" required>
                  {% for d in devices %}
                  <option value="{{ d.id }}">{{ d.name }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-2">
                <label class="form-label">Student Username</label>
                <input class="form-control" type="text" name="student_username" placeholder="student1" required />
              </div>
              <button class="btn btn-outline-primary" type="submit">Assign</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5>Create Lab</h5>
            <form action="/admin/labs/create" method="post">
              <div class="mb-2">
                <label class="form-label">Title</label>
                <input class="form-control" type="text" name="title" required />
              </div>
              <div class="mb-2">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="2"></textarea>
              </div>
              <div class="mb-2">
                <label class="form-label">Check Rules (regex per line)</label>
                <textarea class="form-control" name="check_rules" rows="6" required></textarea>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="is_active" value="true" id="labActive" />
                <label class="form-check-label" for="labActive">Active</label>
              </div>
              <button class="btn btn-success" type="submit">Create Lab</button>
            </form>
          </div>
        </div>

        <div class="card mt-3">
          <div class="card-body">
            <h5>Labs</h5>
            <table class="table table-sm">
              <thead><tr><th>ID</th><th>Title</th><th>Status</th><th></th></tr></thead>
              <tbody>
              {% for lab in labs %}
                <tr>
                  <td>{{ lab.id }}</td>
                  <td>{{ lab.title }}</td>
                  <td>{{ "active" if lab.is_active else "inactive" }}</td>
                  <td>
                    <form action="/admin/labs/{{ lab.id }}/toggle" method="post">
                      <button class="btn btn-sm btn-outline-secondary" type="submit">Toggle</button>
                    </form>
                  </td>
                </tr>
              {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
